<div class="container">
    <div class="card border-primary-subtle shadow">
        <div class="card-header bg-primary text-light fw-bold h5">
            <i class="bi bi-people-fill"></i> Gestion des Utilisateurs
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nom d'utilisateur</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody>
                    @for (user of utilisateurs; track user.id) {
                    <tr>
                        <td>{{ user.id }}</td>
                        <td><strong>{{ user.username }}</strong></td>
                        <td>{{ user.email }}</td>
                        <td>
                            <span class="badge"
                                [class.bg-danger]="user.role.nomLogic === 'ROLE_ADMIN'"
                                [class.bg-secondary]="user.role.nomLogic !== 'ROLE_ADMIN'">
                                {{ user.role.nom }}
                            </span>
                        </td>
                    </tr>
                    }
                    @empty {
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">
                            <i class="bi bi-exclamation-triangle"></i>
                            Aucun utilisateur trouvé. Vérifiez que votre API Backend est bien lancée sur le port 8080.
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
